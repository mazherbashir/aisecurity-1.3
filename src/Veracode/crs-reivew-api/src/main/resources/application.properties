spring.application.name=crs-reivew-api
server.port=8081
server.error.include-message=always
veracode.api.url=https://api.veracode.com
veracode.api.debug=true
spring.jackson.serialization.indent-output=true
veracode.api.ignore-modules=Microsoft,Azure,System,AspNetCore,Newtonsoft,EntityFramework,NLog,Log4Net,AutoMapper,AppInsights,UnitTesting,BouncyCastle,Serilog,Dapper,OpenXml,Serialization,OpenXmlPowerTools,GemBox,SharpDocx,Quartz,sni.dll,VeracodeJavaAPI.jar,.Tests.dll
veracode.api.include-modules =veracodegen.htmla.pya,pwc.,.zip,.war,snapshot.jar,0.jar,pwc,release.jar,app_web,.bca,.gz,-service.jar,-advancer.jar
veracode.api.ignore-ecosystems=so

veracode.api.architecture-mappings.CIL32=nuget
veracode.api.architecture-mappings.MSIL=nuget
veracode.api.architecture-mappings.JAVASCRIPT=npm
veracode.api.architecture-mappings.PYTHON=pip
veracode.api.architecture-mappings.JAVA=maven
veracode.api.architecture-mappings.JVM=maven
veracode.api.architecture-mappings.PHP=composer
veracode.api.architecture-mappings.RUBY=rubygems
veracode.api.architecture-mappings.GO=go
veracode.api.architecture-mappings.GOLANG=go